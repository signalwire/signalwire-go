# golangci-lint config for signalwire-go.
#
# This is the LINT-depth config — the advisory-tier linter that goes beyond the
# `go vet` floor wired into scripts/run-ci.sh. It was stood up after a one-time
# burndown (PR "golangci burndown") cleared the backlog to zero:
#   - errcheck:    every unchecked error handled (incl. _test.go — tests are
#                  usage examples, so an unchecked error there is a bad example).
#   - staticcheck: real bugs fixed (a regexp with RE2-unsupported lookahead that
#                  panicked at runtime; two dead-value SA4006s; a never-true
#                  SA4023 test assertion) + the S-series simplifications applied.
#   - ineffassign / unused: cleared.
#
# Discipline (mirrors the signalwire-rust clippy gate): fix by hand, never
# --fix; a short, JUSTIFIED disable list, not blanket suppression; parity wins
# over style in a genuine conflict (e.g. two registry.go error strings stay
# capitalized to match Python's ValueError text, suppressed inline via
# //nolint:staticcheck with a reason).
version: "2"

linters:
  # The curated-standard set: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  # Additional linters adopted after a measured survey of all ~95 disabled
  # linters (each run against the codebase; findings sampled for real-vs-noise).
  # Every linter here either found GENUINE issues that were fixed by hand, or is
  # clean today and guards an applicable bug class (a zero-hit linter is a free
  # regression guard — it's only worthless when the bug class can't occur here).
  enable:
    - forcetypeassert  # unchecked x.(T) panics — 388 sites fixed (test helper `as[T]`)
    - errchkjson       # unchecked json.Marshal(any) can silently fail — fixed
    - intrange         # Go 1.22 integer range — modernized
    - prealloc         # slice preallocation (perf) — applied
    - unconvert        # redundant type conversions — removed
    - errname          # sentinel errors named errXxx — renamed
    - errorlint        # err != sentinel fails on wrapped errors — switched to errors.Is
    - predeclared      # param shadowing a predeclared builtin (max) — renamed
    - gocritic         # mixed; assignOp/ifElseChain/unlambda fixed, 3 appendAssign //nolint'd as intentional
    # Zero-hit guards (clean today; the bug class CAN occur here, so they protect
    # against regressions — adopted on value, not on hit-count):
    - durationcheck    # time.Duration multiplication mistakes
    - makezero         # make([]T, len) then append (double-length bug)
    - nilnesserr       # returning a nil error after a non-nil err check
    - bidichk          # dangerous bidi unicode (trojan-source)
    - reassign         # reassigning stdlib/pkg-level vars
    - recvcheck        # mixed value/pointer receivers on one type
    - wastedassign     # assignments whose value is never read (clean today)
    # Bug-finder tier — adopted after a SECOND measured survey (the "lint
    # bug-finders" sweep) of 7 not-yet-enabled bug-finders, at a LOW keep
    # threshold: keep a linter if it could plausibly catch even ONE real bug
    # someday (the //nolint noise tax is acceptable); drop only pure noise.
    # gosec found a GENUINE prod bug — the Slowloris/ReadHeaderTimeout gap on
    # BOTH HTTP servers (now fixed); the rest are clean-today regression guards.
    - gosec            # security: caught G112 Slowloris (no ReadHeaderTimeout) on both servers — FIXED; guards SSRF/weak-crypto/path-traversal. Test+codegen paths excluded below; genuine prod FPs carry //nolint:gosec with the G-code reason.
    - bodyclose        # leaked HTTP response bodies — clean after 1 //nolint on the gorilla/websocket dial (lib closes the handshake body) + 3 expect-failure TLS tests (resp is nil on the error path)
    - nilerr           # `if err != nil { return nil }` — the real swallowed-error bug class; the 5 sites are the filepath.Walk continue idiom + a CLI raw-output fallback (//nolint'd)
    - nilnil           # `return nil, nil` ambiguity — the 3 sites are intentional "absent, not an error" (no-result SWAIG handler / selector matched nothing) //nolint'd
    - exhaustive       # missing enum switch arm (the "added a value, forgot the case" bug) — default-signifies-exhaustive (below) + one //exhaustive:ignore cover the by-design subset switches
  # DELIBERATELY NOT ADOPTED (measured + sampled — they fire on idiomatic Go in
  # this codebase, 0 real issues; adopting would mean //nolint on correct code):
  #   contextcheck  — flags the defensive `if ctx == nil { ctx = Background() }`
  #                   guard on RunContext/DialContext (+ the deliberate Background()
  #                   drain that must outlive a cancelled ctx), which DO honor the
  #                   caller's ctx. Re-probed in the bug-finder sweep: 6 findings,
  #                   all that idiom, 0 real ctx-drop — no realistic true positive.
  #   noctx         — would force NewRequestWithContext everywhere, but the
  #                   SWAIG/skill handler API (func(args, rawData) any) is
  #                   context-free by Python parity, so the prod call sites can
  #                   NEVER thread a caller ctx. Re-probed: 103 findings (88 tests,
  #                   15 structurally-unfixable prod), 0 real bugs — pure noise here.
  #   unparam       — flags test-helper params that are constant because the
  #                   helper has one caller; not a real defect.
  #   goprintffuncname — would rename logger.Debug/Info/Warn/Error to *f; those
  #                   are public API named to mirror Python's logger.debug/info,
  #                   so renaming both breaks the API and diverges from parity.
  #   usetesting    — os.Setenv -> t.Setenv in tests; the existing manual
  #                   save/restore is already correct, and t.Setenv("",..) sets
  #                   empty (not unset), changing LookupEnv semantics — net style,
  #                   not a bug. Revisit if we standardize test env handling.
  #   dupword       — single hit is a legitimate rendered-markdown test fixture
  #                   ("## Top\n\nTop body"), a false positive on correct data.
  settings:
    staticcheck:
      checks:
        - all
        # Disable the QF* "quickfix" family. These are staticcheck's lowest-
        # confidence, purely-opinionated style refactors (the QF prefix is
        # literally "quickfix"), and the specific instances here are either
        # less readable rewritten or risk a subtle inversion of Python-mirrored
        # logic — exactly the parity-over-style line we hold:
        #   QF1001 (apply De Morgan's law): the pom.go pointer-tristate
        #     conditions (`!(x != nil && !*x)`) and char-range checks read
        #     clearer as-is; De Morgan would obscure the "not a letter" intent
        #     and risk inverting the nil/true/false logic that mirrors Python.
        #   QF1008 (remove embedded field from selector): `a.Service.Route` is
        #     deliberately explicit about where Route comes from; dropping the
        #     embedded `Service` qualifier is a readability downgrade, not a fix.
        - -QF1001
        - -QF1008
    exhaustive:
      # A switch with a `default:` is treated as exhaustive. Every flagged
      # switch here deliberately handles a SUBSET of its enum and routes the
      # rest through `default` (math.go's calculator over go/token.Token,
      # route-registry over reflect.Kind, platformBaseURL over ExecutionMode) —
      # so a `default` is the correct, intentional shape, not a missing arm.
      # The one default-less subset switch (MessageState.IsTerminal) carries an
      # //exhaustive:ignore with its rationale. exhaustive still fires on a
      # genuinely missing arm in a default-less switch — the bug we want caught.
      default-signifies-exhaustive: true
  exclusions:
    # Lint GENERATED code too. golangci-lint's default (`lax`) auto-skips files
    # carrying the `// Code generated … DO NOT EDIT.` header — so the whole
    # generated REST/SWML/SWAIG surface would go unchecked. `disable` turns the
    # generated-file exclusion OFF entirely: generated code is linted exactly like
    # hand-written code (GEN-IDIOM gate). (`strict` only tightens the detection
    # heuristic — it STILL excludes; `disable` is the real opt-in.)
    generated: disable
    rules:
      # gosec on TEST files: hardcoded test credentials (G101), and the
      # subprocess / file-inclusion / file-perm patterns in test + mock
      # harnesses (G204/G304/G306/G705) are test-only and not production attack
      # surface. Scoped here rather than scattering ~40 //nolint across tests.
      - path: _test\.go
        linters:
          - gosec
      # gosec on DEV/CODEGEN tooling and internal mock harnesses — not shipped,
      # not production attack surface. `cmd/*`: signature/surface enumerators,
      # swaig-test CLI, emit-skills, route-registry. `internal/*`: top-level
      # internal/surface (the doc-symbol mapping tables that trip G101 on
      # method-name strings) AND pkg/{relay,rest}/internal/mocktest (test mock
      # servers — those internal dirs contain only the mocktest harness).
      - path: (^|/)(cmd|internal)/
        linters:
          - gosec
      # gosec G101 on GENERATED REST wire-type enum constants: the emitter names
      # permission/scope enum types like `RoomTokenPermission` and gives them wire
      # string VALUES (e.g. "room.set_position") — gosec's credential heuristic
      # misreads the `Token`-in-the-name + string-literal pair as a hardcoded
      # secret. These are OpenAPI enum constants (the wire's permission vocabulary),
      # not credentials. Narrow: only gosec, only the generated type files — every
      # other linter still runs over the generated code (GEN-IDIOM opt-in above).
      - path: _types_generated\.go
        linters:
          - gosec
        text: "G101"
