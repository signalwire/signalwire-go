name: Test

# Runs the full per-port CI gate set via scripts/run-ci.sh:
#   TEST → SIGNATURES → DRIFT → SURFACE-FRESH → NO-CHEAT → EMISSION
#   → FMT → LINT (go vet + golangci-lint) → DOC-AUDIT → SURFACE-DIFF
# Mirrors `bash scripts/run-ci.sh` exactly so there's no drift between local
# and CI behavior. Previously this workflow ran only `go vet` + `go test`,
# which left the EMISSION and NO-CHEAT gates unenforced on every Go PR — a
# behavioral-emission regression (wrong to_dict()/ToMap() shape) could land
# green. run-ci.sh closes that hole.

env:
  # Opt into Node.js 24 ahead of GitHub's 2026-06-02 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout signalwire-go
        uses: actions/checkout@v7
        with:
          path: signalwire-go

      - name: Checkout porting-sdk (mock servers + audit scripts + EMISSION corpus)
        uses: actions/checkout@v7
        with:
          repository: signalwire/porting-sdk
          path: porting-sdk
          token: ${{ secrets.PORTING_SDK_TOKEN }}

      # The EMISSION gate compares this port's ToMap()/to_value() output against
      # the signalwire-python oracle (FunctionResult), which pulls fastapi via
      # signalwire/__init__. Check it out as a sibling so the gate has its
      # reference (it is NOT present in this per-port workflow otherwise).
      - name: Checkout signalwire-python (EMISSION oracle)
        uses: actions/checkout@v7
        with:
          repository: signalwire/signalwire-python
          path: signalwire-python
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: signalwire-go/go.mod
          cache: true
          cache-dependency-path: signalwire-go/go.sum

      # Install golangci-lint (install-only) so run-ci.sh's LINT gate
      # (go vet + golangci-lint) finds it on PATH. The official action handles
      # caching + pinning; the version here MUST stay in lockstep with the note
      # in scripts/run-ci.sh. We do NOT lint via the action — run-ci.sh is the
      # single canonical entry point and invokes golangci with the repo's
      # .golangci.yml itself.
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-only: true

      - name: Set up Python (porting-sdk audit scripts + mock servers)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Python test harnesses (mock_relay + mock_signalwire)
        run: |
          pip install -e porting-sdk/test_harness/mock_relay
          pip install -e porting-sdk/test_harness/mock_signalwire

      # The EMISSION gate needs `import signalwire` (the oracle). Install it from
      # the adjacent checkout only if it isn't already importable.
      - name: Install signalwire-python (EMISSION oracle) if not importable
        run: |
          if python -c "import signalwire.core.function_result" 2>/dev/null; then
            echo "signalwire-python already importable; skipping install"
          else
            pip install ./signalwire-python
          fi

      - name: Select gate tier (promote to nightly if PR touches docs/examples)
        id: tier
        working-directory: signalwire-go
        run: |
          tier=pr
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            if git fetch --no-tags --depth=1 origin "$base" 2>/dev/null \
               && git diff --name-only "$base"...HEAD 2>/dev/null \
                  | grep -qE '^(docs/|examples/|README|.*\.md$)'; then
              tier=nightly
              echo "PR touches docs/examples -> running heavy doc gates (tier=nightly)"
            fi
          fi
          echo "tier=$tier" >> "$GITHUB_OUTPUT"

      - name: "Run CI gate script (10 gates: TEST, SIGNATURES, DRIFT, SURFACE-FRESH, NO-CHEAT, EMISSION, FMT, LINT, DOC-AUDIT, SURFACE-DIFF)"
        working-directory: signalwire-go
        env:
          PORTING_SDK: ${{ github.workspace }}/porting-sdk
          SW_CI_TIER: ${{ steps.tier.outputs.tier }}
        run: bash scripts/run-ci.sh

  # Windows portability guard. The full run-ci.sh gate set is Linux-only (the
  # cross-port mock servers are POSIX, and the audit scripts assume bash +
  # signalwire-python adjacency). But the Go SOURCE must still COMPILE, vet, and
  # test on Windows — a platform-specific construct without a build constraint
  # (e.g. syscall.SysProcAttr.Setpgid, which does not exist on GOOS=windows)
  # otherwise breaks the Windows build silently, since the Linux-only matrix
  # never exercises it. This lean job builds/vets/tests the module on Windows.
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout signalwire-go
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go build (all packages, incl. test files via vet)
        run: go build ./...

      - name: go vet (compiles test files too — catches unconstrained syscall use)
        run: go vet ./...

      - name: go test
        run: go test ./...
